name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Instalar dependÃªncias
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Testes
        run: pnpm test

      - name: Build
        run: pnpm build

  deploy-api:
    name: Deploy API (Cloudflare Workers)
    needs: verificar
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Instalar dependÃªncias
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN ausente â€” deploy pulado. Crie o token no painel Cloudflare (modelo 'Edit Cloudflare Workers') e adicione os secrets CLOUDFLARE_API_TOKEN e CLOUDFLARE_ACCOUNT_ID no GitHub para ativar."
            exit 0
          fi
          pnpm --filter @balcao/api exec wrangler deploy
